<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Lg Dashboard",
  "schemaVersion": 1,
  "description": "Content pipeline dashboard for Lux Gray, Brigit Heart, and Lady Venus. Tracks clips, upload statuses, timers, and invoicing for all three creators."
}
</script>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --bg:#fdf8f5; --surface:#fff; --border:#ede4de;
  --text:#2a1f1c; --muted:#7d6358; --faint:#bea89e;
  --rose:#c4506a; --rose-bg:#fdf0f3; --rose-b:#f5c8d3; --rose-mid:#e8a0b0;
  --violet:#8b5fbf; --violet-bg:#f6f0fc; --violet-b:#d9c5ef;
  --amber:#c46a35; --amber-bg:#fdf3ee; --amber-b:#f5c9ac;
  --green:#4a8c68; --green-bg:#eef8f3; --green-b:#a8dbbf;
  --sky:#4a7fa5; --sky-bg:#eef5fb; --sky-b:#a8ccde;
  --teal:#3a8c80; --teal-bg:#eef8f6; --teal-b:#a8d9d2;
  --sh:0 1px 4px rgba(80,30,20,.06),0 1px 2px rgba(80,30,20,.04);
  --sh2:0 6px 24px rgba(80,30,20,.1),0 1px 4px rgba(80,30,20,.05);
  --accent:#c4506a; --accent-bg:#fdf0f3; --accent-b:#f5c8d3;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:18px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:80px}

/* ── Sticky header ── */
.header-sticky{position:sticky;top:0;z-index:20}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 6px rgba(80,30,20,.06)}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;box-shadow:0 2px 8px rgba(80,30,20,.2);transition:background .3s}
.brand-name{font-size:20px;font-weight:700;letter-spacing:-.3px}
.topstats{display:flex;gap:14px}
.tstat{display:flex;align-items:center;gap:5px;font-size:15px;font-weight:500;color:var(--muted)}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Creator switcher ── */
.creator-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;align-items:center}
.creator-bar-lbl{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-right:4px}
.cpill{padding:7px 18px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:7px}
.cpill:hover{border-color:var(--accent)}
.cpill.active{color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(80,30,20,.18)}
.cpill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Goal / client banner ── */
.goal-wrap{padding:18px 24px 0}
.goal-card{background:linear-gradient(135deg,#fdf0f3,#f6f0fc);border:1px solid var(--rose-b);border-radius:var(--r);padding:16px 20px;display:flex;align-items:flex-start;gap:16px}
.goal-card.client-card{background:linear-gradient(135deg,var(--accent-bg),#f6f0fc);border-color:var(--accent-b)}
.goal-icon{font-size:28px;flex-shrink:0;margin-top:1px}
.goal-eyebrow{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);opacity:.8;margin-bottom:5px}
.goal-body{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.2px;line-height:1.3}
.goal-body em{font-style:normal;color:var(--accent)}
.msg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin:12px 0 0;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--sh)}
.msg-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.msg-text{font-size:16px;color:var(--muted);font-style:italic;line-height:1.5}

/* ── Tabs ── */
.tabs{display:flex;padding:18px 24px 0;gap:2px}
.tab{padding:10px 22px;border-radius:9px 9px 0 0;font-size:16px;font-weight:600;cursor:pointer;color:var(--faint);background:transparent;border:none;font-family:inherit;border-bottom:2px solid transparent;transition:color .15s}
.tab:hover{color:var(--muted)}
.tab.active{color:var(--accent);background:var(--surface);border-color:var(--accent);box-shadow:0 -1px 0 var(--border),1px 0 0 var(--border),-1px 0 0 var(--border)}

/* ── Page ── */
.page{padding:0 24px 24px}
.sec-lbl{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:22px 0 12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Do This Next ── */
.dtn-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh2);overflow:hidden}
.dtn-top{padding:24px 24px 20px;cursor:pointer;user-select:none;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.dtn-left{flex:1;min-width:0}
.dtn-eyebrow{font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dtn-pulse{width:8px;height:8px;border-radius:50%;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.dtn-action{font-size:24px;font-weight:700;letter-spacing:-.4px;line-height:1.25;margin-bottom:8px}
.dtn-clip{font-size:16px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.id-badge{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:13px;font-weight:700;color:var(--faint);flex-shrink:0}
.id-badge-input{width:70px;flex-shrink:0;background:var(--surface);border:1.5px solid var(--accent-b);border-radius:5px;padding:3px 9px;font-size:13px;font-weight:700;color:var(--text);font-family:inherit;outline:none}
.dtn-chev{flex-shrink:0;color:var(--faint);font-size:14px;margin-top:8px;transition:transform .2s}
.dtn-chev.open{transform:rotate(180deg)}
.dtn-body{display:none;padding:0 24px 24px}
.dtn-body.open{display:block}
.dtn-divider{height:1px;background:var(--border);margin:0 -24px 20px}

/* action panels */
.action-panel{background:var(--bg);border-radius:12px;padding:18px;margin-bottom:6px;border:1px solid var(--border)}
.action-panel-lbl{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.big-check{display:flex;align-items:center;gap:12px;padding:16px 18px;border:2px solid var(--border);border-radius:12px;cursor:pointer;background:var(--surface);transition:all .15s;user-select:none}
.big-check:hover{border-color:var(--rose-mid)}
.big-check.checked{background:var(--green-bg);border-color:var(--green-b)}
.check-box{width:26px;height:26px;border-radius:8px;border:2px solid #d4c8c0;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface)}
.big-check.checked .check-box{background:var(--green);border-color:var(--green)}
.check-txt{font-size:16px;font-weight:600;color:var(--muted)}
.big-check.checked .check-txt{color:var(--green)}
.plat-action-btn{width:100%;padding:15px;border-radius:12px;border:2px solid var(--border);background:var(--surface);font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.plat-action-btn:hover{border-color:var(--rose-mid);background:var(--rose-bg)}
.plat-action-btn.upload-btn{border-color:var(--sky-b);color:var(--sky);background:var(--sky-bg)}
.plat-action-btn.upload-btn:hover{background:#dceef8}
.plat-action-btn.promo-btn{border-color:var(--teal-b);color:var(--teal);background:var(--teal-bg)}

/* fields */
.field-row{margin-bottom:14px}
.field-lbl{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.field-val{font-size:16px;line-height:1.6;color:#4a3530;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;min-height:38px;cursor:pointer;transition:border-color .15s}
.field-val:hover{border-color:var(--rose-mid)}
.field-val.empty{color:var(--faint);font-style:italic}
.kw-wrap{display:flex;flex-wrap:wrap;gap:6px;cursor:pointer;min-height:34px;padding:4px 0}
.kw-chip{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-b);border-radius:20px;padding:3px 12px;font-size:13px;font-weight:600}
input[type=text],textarea,select{width:100%;font-family:inherit;font-size:16px;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;outline:none;transition:border-color .15s,box-shadow .15s}
input[type=date]{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;outline:none;transition:border-color .15s;width:100%;cursor:pointer}
input[type=text]:focus,textarea:focus,select:focus,input[type=date]:focus{border-color:var(--rose-mid);box-shadow:0 0 0 3px rgba(212,99,122,.12)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.btn{padding:9px 17px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s,transform .1s}
.btn:hover{opacity:.87}.btn:active{transform:scale(.97)}
.btn-dark{background:var(--accent);color:#fff}
.btn-ghost{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.btn-del{background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-b);font-size:13px;padding:6px 13px}
.sales-panel{background:var(--green-bg);border:1.5px solid var(--green-b);border-radius:12px;padding:16px;margin-bottom:16px}
.sales-row{display:flex;gap:12px;flex-wrap:wrap}
.sales-field{flex:1;min-width:130px}
.clip-details-box{border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.clip-details-summary{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;background:var(--bg);user-select:none}
.clip-details-summary:hover{color:var(--text)}
.clip-details-body{padding:16px}
.add-toggle{display:flex;gap:0;margin-bottom:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:3px}
.seg-btn{flex:1;padding:8px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);border-radius:7px;cursor:pointer;transition:background .12s,color .12s}
.seg-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* asset checks */
.asset-checks{display:flex;gap:8px;flex-wrap:wrap}
.ack{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;background:var(--surface);transition:all .15s;user-select:none}
.ack:hover{border-color:var(--rose-mid)}
.ack.done{background:var(--green-bg);border-color:var(--green-b)}
.ack-box{width:19px;height:19px;border-radius:5px;border:2px solid #d4c8c0;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface)}
.ack.done .ack-box{background:var(--green);border-color:var(--green)}
.ack-lbl{font-size:14px;font-weight:600;color:var(--muted)}
.ack.done .ack-lbl{color:var(--green)}

/* platform table */
.plat-table{border-radius:12px;border:1px solid var(--border);overflow:hidden;background:var(--surface)}
.plat-row{display:grid;grid-template-columns:52px 1fr 148px 52px;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.plat-row:last-child{border-bottom:none}
.plat-row:hover{background:var(--bg)}
.plat-row.na-row-dim{opacity:.4}
.plat-name-lbl{font-size:14px;font-weight:800;color:var(--muted);letter-spacing:.04em}
.plat-date-col{min-width:0}
.plat-date-col input[type=date]{font-size:13px;padding:5px 8px}
.plat-date-col .no-date{font-size:13px;color:var(--faint);font-style:italic}
.plat-status-col{display:flex;justify-content:flex-end}
.pst-btn{padding:5px 11px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;white-space:nowrap;transition:all .12s}
.pst-btn:hover{border-color:var(--rose-mid)}
.pst-btn.is-up{background:var(--sky-bg);border-color:var(--sky-b);color:var(--sky)}
.pst-btn.is-pr{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.pna-btn{padding:4px 9px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--faint);font-family:inherit;transition:all .12s}
.pna-btn.na-on{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-b)}
.plat-date-due{color:var(--rose);font-size:12px;font-weight:600;margin-top:2px}

/* coming up */
.ctx-line{font-size:15px;color:var(--muted);text-align:center;padding:12px 0 0}
.ctx-line a{color:var(--violet);cursor:pointer;font-weight:600}
.coming-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.coming-cell{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px 10px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .15s,transform .15s}
.coming-cell:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.coming-n{font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:3px}
.coming-lbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}

/* pipeline */
.pipe-group{margin-bottom:6px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.pipe-group-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .12s}
.pipe-group-head:hover{background:var(--bg)}
.pipe-group-label{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.pipe-group-n{background:var(--bg);border-radius:20px;padding:3px 11px;font-size:13px;color:var(--muted);font-weight:600}
.pipe-group-chev{color:var(--faint);font-size:13px;transition:transform .2s}
.pipe-group-chev.open{transform:rotate(180deg)}
.pipe-group-body{display:none;border-top:1px solid var(--border)}
.pipe-group-body.open{display:block}
.pipe-clip-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.pipe-clip-row:last-child{border-bottom:none}
.pipe-clip-row:hover{background:var(--bg)}
.pipe-clip-name{flex:1;font-size:15px;font-weight:500}
.pipe-clip-sub{font-size:13px;color:var(--faint);font-weight:600}

/* done chips */
.done-grid{display:flex;flex-wrap:wrap;gap:6px}
.done-chip{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:6px 13px;font-size:14px;color:var(--muted);box-shadow:var(--sh);display:flex;align-items:center;gap:6px}
.done-chip .did{font-size:11px;font-weight:700;opacity:.4}

/* calendar */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px}
.cal-nav-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 18px;cursor:pointer;font-family:inherit;font-size:16px;color:var(--muted);font-weight:600;transition:all .12s}
.cal-nav-btn:hover{border-color:var(--rose-mid);color:var(--rose)}
.cal-month-lbl{font-size:22px;font-weight:700;letter-spacing:-.4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day-hdr{text-align:center;font-size:13px;font-weight:700;color:var(--faint);padding:8px 0}
.cal-cell{background:var(--surface);border-radius:11px;border:1px solid var(--border);height:108px;overflow:hidden;padding:9px;transition:box-shadow .12s}
.cal-cell:hover{box-shadow:var(--sh)}
.cal-empty{background:transparent;border:none}
.cal-today{border-color:var(--accent);background:var(--accent-bg)}
.cal-drop-hover{border-color:var(--accent)!important;background:var(--accent-bg)!important;box-shadow:0 0 0 2px var(--accent)}
.cal-drag-ghost{opacity:.92;box-shadow:0 8px 22px rgba(40,15,10,.28);transform:scale(1.03)}
.cal-event[data-drag-clip],.unsched-chip[data-drag-clip]{touch-action:none}
.unsched-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.unsched-chip{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--surface);border:2px solid var(--border);border-radius:20px;font-size:14px;font-weight:700;color:var(--text);cursor:grab;user-select:none;white-space:nowrap}
.unsched-chip:hover{border-color:var(--accent);color:var(--text)}
.cal-past{opacity:.6}
.cal-day-n{font-size:15px;font-weight:700;color:var(--muted);margin-bottom:5px}
.cal-today .cal-day-n{color:var(--accent)}
.cal-plat-toggle{display:flex;gap:8px;margin-bottom:14px}
.cal-plat-btn{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all .15s}
.cal-plat-btn.active-c4s{background:#d4909e;border-color:#d4909e;color:#fff}
.cal-plat-btn.active-lf{background:#90a0d4;border-color:#90a0d4;color:#fff}
.cal-event{font-size:13px;background:var(--violet-bg);border:1px solid var(--violet-b);border-radius:7px;padding:4px 8px;margin-bottom:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--violet);font-weight:600}
.cal-event:hover{background:var(--violet-b)}
.cal-event-plat{font-weight:800;font-size:11px;margin-right:4px;opacity:.85}
.cal-event.is-c4s .cal-event-plat,.cal-event.is-lf .cal-event-plat{display:none}
.cal-event.is-up{background:var(--sky);border-color:var(--sky);color:#fff}
.cal-event.is-pr{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.cal-event.is-c4s{background:#f5d5da;border-color:#d4909e;color:#6a1f2e}
.cal-event.is-lf{background:#d5dff5;border-color:#90a0d4;color:#1f2e6a}
.unsched-chip.is-c4s{background:#f5d5da;border-color:#d4909e;color:#6a1f2e}
.unsched-chip.is-lf{background:#d5dff5;border-color:#90a0d4;color:#1f2e6a}
.cal-more{font-size:11px;color:var(--faint);padding:2px 4px}
.cal-legend{display:flex;gap:14px;padding:12px 0 0;flex-wrap:wrap}
.cal-leg-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:500}
.cal-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* empty state */
.empty-state{text-align:center;padding:50px 24px;color:var(--faint)}
.empty-state .big{font-size:48px;margin-bottom:14px}
.empty-state p{font-size:17px;font-weight:500;margin-bottom:6px}
.empty-state small{font-size:14px}

/* add clip */
.add-wrap{margin-top:18px}
.add-btn{width:100%;padding:14px;border-radius:var(--r);border:1.5px dashed #d4c8c0;background:transparent;color:var(--faint);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:border-color .15s,color .15s}
.add-btn:hover{border-color:var(--rose-mid);color:var(--rose)}
.add-form{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:10px}
.all-clear{text-align:center;padding:60px 24px;color:var(--faint)}
.all-clear .big{font-size:48px;margin-bottom:14px}
.all-clear p{font-size:17px;font-weight:500}
.sep{height:1px;background:var(--border);margin:16px 0}
.err-box{background:var(--rose-bg);border:1px solid var(--rose-b);border-radius:12px;padding:16px;color:var(--rose);font-size:13px;margin:24px;font-family:monospace;white-space:pre-wrap}

/* ── Timer widget ── */
.timer-widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin:18px 24px 0;box-shadow:var(--sh);display:flex;align-items:center;gap:16px;flex-wrap:wrap}

input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.inv-hours-lbl{font-size:15px;color:var(--muted);font-weight:500}

function todayStr(){return new Date().toISOString().split('T')[0];}

function firstIn(c,state){
  var today=todayStr();var dates=c.platformDates||{};
  var overdue=PL.filter(function(pl){return c.platforms[pl]===state&&dates[pl]&&dates[pl]<=today;});
  overdue.sort(function(a,b){return dates[a]<dates[b]?-1:1;});
  if(overdue.length)return overdue[0];
  var future=PL.filter(function(pl){return c.platforms[pl]===state&&dates[pl]&&dates[pl]>today;});
  future.sort(function(a,b){return dates[a]<dates[b]?-1:1;});
  if(future.length)return future[0];
  for(var i=0;i<PL.length;i++){if(c.platforms[PL[i]]===state)return PL[i];}
  return null;
}

function getClipStep(c){
  if(c.status==='idea')  return {type:'film',clip:c,pl:null};
  if(c.status==='filmed')return {type:'edit',clip:c,pl:null};
  if(!c.desc||c.desc.trim().length<10)       return {type:'write-desc',    clip:c,pl:null};
  if(!c.keywords||!c.keywords.length)        return {type:'write-keywords',clip:c,pl:null};
  if(!c.thumbnail)                           return {type:'make-thumbnail',clip:c,pl:null};
  if(creator==='LG'&&!c.nfGbCover)           return {type:'make-nfgbcover',clip:c,pl:null};
  if(c.type!=='photoset'&&!c.preview)        return {type:'make-preview',  clip:c,pl:null};
  var pp=firstIn(c,P);if(pp)return {type:'upload', clip:c,pl:pp};
  var up=firstIn(c,U);if(up)return {type:'promote',clip:c,pl:up};
  return null;
}

function getNext(){
  var all=[];clips.forEach(function(c){var s=getClipStep(c);if(s)all.push(s);});
  if(!all.length)return null;
  all.sort(function(a,b){var pa=GPRI[a.type]||99,pb=GPRI[b.type]||99;return pa!==pb?pa-pb:a.clip.id-b.clip.id;});
  return all[0];
}
function getCounts(){
  var o={upload:0,promote:0,assets:0,desc:0,title:0,keywords:0,edit:0,film:0,done:0};
  clips.forEach(function(c){
    var s=getClipStep(c);if(!s){o.done++;return;}
    if(s.type==='upload')o.upload++;
    else if(s.type==='promote')o.promote++;
    else if(s.type.indexOf('make-')===0)o.assets++;
    else if(s.type==='write-desc')o.desc++;
    else if(s.type==='write-title')o.title++;
    else if(s.type==='write-keywords')o.keywords++;
    else if(s.type==='edit')o.edit++;
    else if(s.type==='film')o.film++;
  });
  return o;
}

function isSimple(){return creator!=='LG';}
function clipUploadedSimple(c){
  // Done when none of THIS creator's platforms are still pending (LF for Brigit, C4S for both).
  return platformsFor(creator).every(function(pl){return c.platforms[pl]!==P;});
}
function getClipStepSimple(c){
  // Simple creators only ever upload — never write desc/keywords/etc.
  // C4S first, then any other pending platform for this creator (LF for Brigit).
  // Venus only has C4S, so she always gets "Upload to C4S".
  if(c.platforms['C4S']===P)return {type:'upload',clip:c,pl:'C4S'};
  var other=platformsFor(creator).filter(function(pl){return pl!=='C4S'&&c.platforms[pl]===P;});
  if(other.length)return {type:'upload',clip:c,pl:other[0]};
  return null;
}
function getNextSimple(){
  var pending=clips.filter(function(c){return !clipUploadedSimple(c);});
  if(!pending.length)return null;
  // sort by the next-upload platform's scheduled date, then by id
  function nextPl(c){var s=getClipStepSimple(c);return s?s.pl:null;}
  pending.sort(function(a,b){
    var da=(a.platformDates&&a.platformDates[nextPl(a)])||'9999';
    var db=(b.platformDates&&b.platformDates[nextPl(b)])||'9999';
    return da<db?-1:da>db?1:a.id-b.id;
  });
  return getClipStepSimple(pending[0]);
}
function doneClipsSimple(){return clips.filter(function(c){return clipUploadedSimple(c);});}

    var dates=c.platformDates||{};
    platList.forEach(function(pl){
      var d=dates[pl];if(!d||c.platforms[pl]===N)return;
      // LF shouldn't appear on calendar until C4S is uploaded
      if(pl==='LF'&&c.platforms['C4S']===P)return;
      if(!evs[d])evs[d]=[];
      evs[d].push(decorate(c,pl));
    });
  });
  return evs;
}
function getCalEvents(){
  return collectCalEvents({},clips,PL,function(c,pl){
    return {clip:c,platform:pl,status:c.platforms[pl]};
  });
}
function getAllCalEvents(){
  var evs={};
  ['LG','BH','LV'].forEach(function(cr){
    var s=localStorage.getItem(storageKey(cr));if(!s)return;
    try{
      var p=JSON.parse(s);
      collectCalEvents(evs,p.clips||[],platformsFor(cr),function(c,pl){
        return {clip:c,platform:pl,status:c.platforms[pl],creator:cr,color:CAL_COLORS[cr]};
      });
    }catch(e){}
  });
  return evs;
}
function fmtDate(d){
  if(!d)return '';var parts=d.split('-');
  var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[parseInt(parts[1])-1]+' '+parseInt(parts[2]);
}

// ── MUTATIONS ──────────────────────────────────────────────────
function cyclePlatform(id,pl){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  var cur=c.platforms[pl];
  if(cur===P)c.platforms[pl]=U;else if(cur===U)c.platforms[pl]=PR;else c.platforms[pl]=P;
  var allDone=PL.every(function(q){return c.platforms[q]===PR||c.platforms[q]===N;});
  if(allDone&&c.status!=='uploaded')c.status='uploaded';
  saveCreator();render();
}
function toggleNA(id,pl){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  if(c.platforms[pl]===N){c.platforms[pl]=P;}
  else{c.platforms[pl]=N;if(c.platformDates)c.platformDates[pl]='';}
  saveCreator();render();
}
function setPlatformDate(id,pl,val){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  if(!c.platformDates)c.platformDates={SM:'',MFC:'',CB:'',SC:'',NF:'',SP:'',C4S:''};
  c.platformDates[pl]=val;
  if(val&&c.platforms[pl]===N)c.platforms[pl]=P;
  saveCreator();render();
}
function toggleCheck(id,field){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  c[field]=!c[field];saveCreator();render();
}
function saveF(id,field,value){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  if(field==='title'&&!value.trim()){editField=null;render();return;} // never blank the clip name
  if(field==='num'&&value.trim()){
    var norm=value.trim().replace(/^#+/,'');
    var dup=clips.find(function(x){return x.id!==id&&x.num&&x.num.replace(/^#+/,'')===norm;});
    if(dup){alert('ID #'+norm+' is already used by "'+dup.title+'". Please choose a different number.');return;}
    value='#'+norm;
  }
  if(field==='keywords')c.keywords=value.split(',').map(function(k){return k.trim();}).filter(Boolean);
  else c[field]=value;
  editField=null;saveCreator();render();
}
// A clip counts as "posted" once it's uploaded or promoted on at least one platform.
function clipIsPosted(c){
  return platformsFor(creator).some(function(pl){var st=c.platforms[pl];return st===U||st===PR;});
}
// Sales fields save quietly (no re-render) so you can tab between the three inputs.
function setSale(id,field,value){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  c[field]=value;saveCreator();
}
function numOnly(v){var n=parseFloat(String(v||'').replace(/[^0-9.]/g,''));return isNaN(n)?null:n;}
// Multiply clips-sold × price into Total Sales — only when the button is clicked.
function calcSales(id){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  var soldEl=document.getElementById('sale_'+id+'_clipsSold');
  var priceEl=document.getElementById('sale_'+id+'_price');
  var sold=numOnly(soldEl?soldEl.value:c.clipsSold);
  var price=numOnly(priceEl?priceEl.value:c.price);
  if(sold===null||price===null){alert('Enter both Number of Clips Sold and Price first.');return;}
  c.clipsSold=soldEl?soldEl.value:c.clipsSold;
  c.price=priceEl?priceEl.value:c.price;
  c.totalSales=String(Math.round(sold*price*100)/100);
  saveCreator();render();
}
function advanceStatus(id){
  var c=clips.find(function(x){return x.id===id;});if(!c)return;
  var ord=['idea','filmed','edited','uploaded'];var i=ord.indexOf(c.status);
  if(i>=0&&i<ord.length-1)c.status=ord[i+1];
  saveCreator();render();
}
function nextClipNum(){
  var max=0;
  clips.forEach(function(c){if(c.num){var n=parseInt(c.num.replace(/[^0-9]/g,''));if(n>max)max=n;}});
  return '#'+(max+1);
}
function doAddClip(title,status,num,length,date,type,desc,keywords){
  if(!title.trim())return;
  var pl={};PL.forEach(function(p){pl[p]=P;});
  var pld={};PL.forEach(function(p){pld[p]=date||'';});
  var assignedNum=num&&num.trim()?num.trim():nextClipNum();
  type=type==='photoset'?'photoset':'clip';
  var kw=keywords?keywords.split(',').map(function(x){return x.trim();}).filter(Boolean):[];
  clips.push({id:nextId++,num:assignedNum,title:title.trim(),uploadTitle:'',keywords:kw,status:status,type:type,
    length:type==='photoset'?'':(length||''),desc:desc||'',thumbnail:false,nfGbCover:false,preview:false,

// ── Pointer-based calendar drag (works on touch AND mouse) ─────────
// Replaces the old HTML5 drag-and-drop, which was desktop-only (the
// draggable/ondrop API does nothing on iOS/touch). Draggable items carry
// data-drag-clip / data-drag-platform / (optional, All-Creators view)
// data-drag-creator; drop targets (day cells) carry data-drop-date.
function calCellUnder(x,y){
  var g=calDrag&&calDrag.ghost;
  if(g)g.style.display='none';                 // don't let the ghost block the hit-test
  var el=document.elementFromPoint(x,y);
  if(g)g.style.display='';
  return el&&el.closest?el.closest('[data-drop-date]'):null;
}
function calPointerDown(e){
  if(e.button!=null&&e.button!==0)return;       // left button / touch only
  var el=e.target.closest&&e.target.closest('[data-drag-clip]');
  if(!el)return;
  calDrag={
    clipId:parseInt(el.getAttribute('data-drag-clip'),10),
    platform:el.getAttribute('data-drag-platform'),
    creator:el.getAttribute('data-drag-creator')||null, // null => active creator
    el:el,startX:e.clientX,startY:e.clientY,moved:false,ghost:null,lastCell:null
  };
  document.addEventListener('pointermove',calPointerMove,{passive:false});
  document.addEventListener('pointerup',calPointerUp);
  document.addEventListener('pointercancel',calPointerUp);
}
function calPointerMove(e){
  if(!calDrag)return;
  if(!calDrag.moved){
    // Wait for a small movement so a plain tap still registers as a click.
    if(Math.abs(e.clientX-calDrag.startX)+Math.abs(e.clientY-calDrag.startY)<6)return;
    calDrag.moved=true;
    var g=calDrag.el.cloneNode(true);
    g.classList.add('cal-drag-ghost');
    g.style.position='fixed';g.style.pointerEvents='none';g.style.zIndex='99999';
    g.style.width=calDrag.el.offsetWidth+'px';g.style.margin='0';
    document.body.appendChild(g);
    calDrag.ghost=g;
    calDrag.el.style.opacity='0.35';
  }
  e.preventDefault();                            // stop the page scrolling mid-drag
  calDrag.ghost.style.left=(e.clientX-calDrag.el.offsetWidth/2)+'px';
  calDrag.ghost.style.top=(e.clientY-16)+'px';
  var cell=calCellUnder(e.clientX,e.clientY);
  if(cell!==calDrag.lastCell){
    if(calDrag.lastCell)calDrag.lastCell.classList.remove('cal-drop-hover');
    if(cell)cell.classList.add('cal-drop-hover');

function calPointerUp(e){
  document.removeEventListener('pointermove',calPointerMove,{passive:false});
  document.removeEventListener('pointerup',calPointerUp);
  document.removeEventListener('pointercancel',calPointerUp);
  if(!calDrag)return;
  var d=calDrag;calDrag=null;
  if(d.ghost)d.ghost.remove();
  if(d.lastCell)d.lastCell.classList.remove('cal-drop-hover');
  if(d.el)d.el.style.opacity='';
  if(!d.moved)return;                            // a tap — let the element's own onclick run
  // Swallow the synthetic click that follows a real drag (so jumpToClip doesn't fire).
  var swallow=function(ev){ev.stopPropagation();ev.preventDefault();};
  document.addEventListener('click',swallow,true);
  setTimeout(function(){document.removeEventListener('click',swallow,true);},350);
  var target=document.elementFromPoint(e.clientX,e.clientY);
  var cell=(target&&target.closest?target.closest('[data-drop-date]'):null)||d.lastCell;
  if(cell)applyCalDrop(d.clipId,d.platform,d.creator,cell.getAttribute('data-drop-date'));

function applyCalDrop(clipId,platform,creator,dateStr){
  if(!dateStr)return;
  if(creator){
    // All-Creators view: the clip belongs to another creator. Edit that
    // creator's stored record directly (store.setItem syncs to Firestore).
    try{
      var s=store.getItem(storageKey(creator));if(!s)return;
      var p=JSON.parse(s);
      var c=(p.clips||[]).find(function(x){return x.id===clipId;});
      if(!c)return;
      if(!c.platformDates)c.platformDates={};
      c.platformDates[platform]=dateStr;
      store.setItem(storageKey(creator),JSON.stringify(p));
    }catch(err){}
  } else {
    // Per-creator calendar: the clip is in the active in-memory array.
    var c2=clips.find(function(x){return x.id===clipId;});
    if(!c2)return;
    if(!c2.platformDates)c2.platformDates={};
    if(platform==='__all__'){
      PL.forEach(function(pl){if(c2.platforms[pl]===P)c2.platformDates[pl]=dateStr;});
    } else {
      c2.platformDates[platform]=dateStr;
    }
    saveCreator();
  }
  render();
}

// ── TIMER & INVOICING ─────────────────────────────────────────
function fmtSeconds(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return h+'h '+String(m).padStart(2,'0')+'m '+String(sec).padStart(2,'0')+'s';
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function fmtSecsClock(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return (h>0?h+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function fmtHours(s){
  var h=Math.floor(s/3600),m=Math.round((s%3600)/60);
  if(m===60){h++;m=0;}
  return h+(m>0?'h '+m+'m':'h');
}
function fmtDateRange(start,end){
  return fmtDate(start)+' – '+fmtDate(end);  // fmtDate already produces "Mon D"
}
function daysDiff(dateStr){
  var d=new Date(dateStr+'T00:00:00');var now=new Date();
  return Math.floor((now-d)/(1000*60*60*24));
}

function startTimer(){
  if(timerRunning)return;
  timerRunning=true;timerStartMs=Date.now();
  timerInterval=setInterval(function(){
    var el=document.getElementById('timer-clock');
    if(el){el.textContent=fmtSecsClock(Math.floor((Date.now()-timerStartMs)/1000));}
  },1000);
  render();
}

function stopTimer(silent){
  if(!timerRunning)return;
  clearInterval(timerInterval);timerInterval=null;timerRunning=false;
  var elapsed=Math.floor((Date.now()-timerStartMs)/1000);
  if(elapsed<1){render();return;}

  if(!silent){
    // Record session
    consulting.sessions.push({id:consulting.nextSessionId++,date:todayStr(),seconds:elapsed});

    // Accumulate into current period, create invoices when threshold crossed
    var threshold=Math.round(consulting.hoursPerInvoice*3600);
    consulting.currentPeriodSeconds+=elapsed;

    while(consulting.currentPeriodSeconds>=threshold){
      var invEnd=todayStr();
      consulting.invoices.unshift({
        id:consulting.nextInvoiceId++,
        invoiceNum:consulting.nextInvoiceNum++,
        periodStart:consulting.currentPeriodStart,
        periodEnd:invEnd,
        hours:consulting.hoursPerInvoice,
        rate:consulting.rate,
        currency:consulting.currency,
        invoicedAt:null,
        paidAt:null
      });
      consulting.currentPeriodSeconds-=threshold;
      consulting.currentPeriodStart=todayStr();
    }
    saveConsulting();
  }
  render();
}

function addManualSession(){
  var dateEl=document.getElementById('man-date');

  if(!dateEl||!hEl||!mEl)return;
  var date=dateEl.value||todayStr();
  var hours=parseInt(hEl.value)||0;
  var mins=parseInt(mEl.value)||0;
  var secs=(hours*3600)+(mins*60);
  if(secs<60){alert('Please enter at least 1 minute.');return;}
  consulting.sessions.push({id:consulting.nextSessionId++,date:date,seconds:secs,manual:true});
  var threshold=Math.round(consulting.hoursPerInvoice*3600);
  consulting.currentPeriodSeconds+=secs;
  while(consulting.currentPeriodSeconds>=threshold){
    consulting.invoices.unshift({
      id:consulting.nextInvoiceId++,
      invoiceNum:consulting.nextInvoiceNum++,
      periodStart:consulting.currentPeriodStart,
      periodEnd:date,
      hours:consulting.hoursPerInvoice,
      rate:consulting.rate,
      currency:consulting.currency,
      invoicedAt:null,

    });
    consulting.currentPeriodSeconds-=threshold;

  }
  manualEntryOpen=false;saveConsulting();render();

function deleteSession(sid){
  var s=consulting.sessions.find(function(x){return x.id===sid;});
  if(!s)return;
  if(!confirm('Remove this '+fmtSeconds(s.seconds)+' session on '+fmtDate(s.date)+'?'))return;
  consulting.currentPeriodSeconds=Math.max(0,consulting.currentPeriodSeconds-s.seconds);
  consulting.sessions=consulting.sessions.filter(function(x){return x.id!==sid;});
  saveConsulting();render();
}

function addDays(dateStr,n){
  var d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+n);

function longDate(dateStr){

  var p=dateStr.split('-');return mo[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];

  return h;

function isDesktop(){return typeof window!=='undefined'&&!!window.matchMedia&&window.matchMedia('(min-width:1024px)').matches;}

// Lightweight DOM confetti — a little celebration when you finish something.
function confetti(){
  if(typeof document==='undefined')return;
  var colors=['#d4637a','#9b7dbd','#3a8c80','#e8b04b','#7272b8','#4a8c68'];
  var box=document.createElement('div');box.className='confetti-box';
  document.body.appendChild(box);
  for(var i=0;i<90;i++){
    var p=document.createElement('div'),sz=6+Math.random()*7;
    p.className='confetti-bit';
    p.style.cssText='left:'+(Math.random()*100)+'%;width:'+sz+'px;height:'+(sz*0.5)+'px;background:'+colors[i%colors.length]+';transform:rotate('+(Math.random()*360)+'deg);animation-duration:'+(1.5+Math.random()*1.6)+'s;animation-delay:'+(Math.random()*0.35)+'s';
    box.appendChild(p);
  }
  setTimeout(function(){box.remove();},3400);
}

// The single most pressing thing across ALL creators: soonest scheduled upload.
function dtGlobalNext(){
  var evMap=getAllCalEvents(),all=[];
  Object.keys(evMap).forEach(function(d){(evMap[d]||[]).forEach(function(ev){if(ev.status===P)all.push({date:d,ev:ev});});});
  all.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  return all.length?all[0]:null;
}
function dtDoNext(){
  dtRightView='edit';dtAnimate=true;
  var g=dtGlobalNext();
  if(!g){expanded=false;dtNextId=null;render();return;}
  if(creator!==g.ev.creator)switchCreator(g.ev.creator); // load that creator's clips into the middle pane
  dtNextId=g.ev.clip.id;expanded=g.ev.clip.id;
  render();
}

// Posted clips: surface the sales panel and tuck the editable info into a collapsible.
function wrapDetail(c,body,del){
  if(!clipIsPosted(c))return body+del;
  var head='<div class="clip-details-summary" onclick="detailsOpen=!detailsOpen;render()"><span>Clip details</span><span>'+(detailsOpen?'&#9662;':'&#9656;')+'</span></div>';
  var box='<div class="clip-details-box">'+head+(detailsOpen?'<div class="clip-details-body">'+body+del+'</div>':'')+'</div>';
  return renderSales(c)+box;

function renderClipDetail(c){

  var action=(s&&(s.type==='film'||s.type==='edit'))?(renderActionPanel(s)+'<div class="sep"></div>'):'';
  if(isSimple()){
    // BH/LV: two columns that fill the pane — writing left, schedule + meta right.
    var SL='',SR='';

    SR+=renderPlatforms(c);

    if(creator==='LV')SR+=renderField(c,'notes','Notes','Any notes…');

  }
  // LG: writing on the left, schedule + assets on the right; remove spans full width.
  var L='',R='';

    var dv=(step.pl&&c.platformDates&&c.platformDates[step.pl])?c.platformDates[step.pl]:'';
    h+='<div class="dt-next" style="border-left:4px solid '+col+'">';
    h+='<div class="dt-next-eyebrow" style="color:'+col+'"><span class="dtn-pulse" style="background:'+col+'"></span>DO THIS NEXT</div>';
    h+='<div class="dt-next-action">'+esc(head)+'</div>';
    h+='<div class="dt-next-sub">for '+(c.num?esc(c.num):fid(c.id))+' &ldquo;'+esc(c.title)+'&rdquo;'+(dv?' &middot; scheduled '+esc(fmtDate(dv)):'')+'</div>';
    h+='</div>';
  }
  var titleEditing=editField&&editField.id===c.id&&editField.field==='title';
  var numEditing=editField&&editField.id===c.id&&editField.field==='num';
  h+='<div class="dt-detail-head">';
  if(numEditing)h+='<input class="id-badge-input" id="fe_'+c.id+'_num" value="'+esc((c.num||'').replace(/^#+/,''))+'" onkeydown="if(event.key===\'Enter\')saveF('+c.id+',\'num\',this.value)" onblur="saveF('+c.id+',\'num\',this.value)">';
  else h+='<span class="id-badge" title="Click to edit clip #" style="cursor:pointer" onclick="editField={id:'+c.id+',field:\'num\'};render()">'+(c.num?esc(c.num):fid(c.id))+'</span>';
  if(titleEditing)h+='<input class="dt-title-input" id="fe_'+c.id+'_title" value="'+esc(c.title)+'" onkeydown="if(event.key===\'Enter\')saveF('+c.id+',\'title\',this.value)" onblur="saveF('+c.id+',\'title\',this.value)">';
  else h+='<span class="dt-detail-title" title="Click to rename" onclick="editField={id:'+c.id+',field:\'title\'};render()">'+esc(c.title)+'</span>';
  h+='</div>';
  h+='<div class="dt-form">'+renderClipDetail(c)+'</div>';
  return h;
}
function dtDetail(){
  var c=clips.find(function(x){return x.id===expanded;});
  if(!c){ // nothing selected → default to this creator's next clip (no card)
    var nx0=isSimple()?getNextSimple():getNext();
    if(nx0)c=nx0.clip;
  }
  if(!c)return '<div class="dt-empty"><div class="dt-emoji">&#127881;</div>Nothing left for '+esc((CREATORS[creator]||{name:'this creator'}).name)+'!<br><small>All caught up — your inner child says thanks.</small></div>';
  // The "DO THIS NEXT" card only appears for the cross-creator pick (the Do This Next button).
  var step=(c.id===dtNextId)?(isSimple()?getClipStepSimple(c):getClipStep(c)):null;
  return dtClipEditor(c,step);
}

// The "why" reminder (shown on every right-pane screen) + the rotating quote.
function dtWhyCard(){
  return '<div class="goal-card dt-why"><div class="goal-icon">&#10024;</div>'
    +'<div class="goal-eyebrow">Your why</div>'
    +'<div class="goal-body">Keep my <em>inner child</em> financially safe.</div></div>';
}
function dtQuoteCard(){
  return '<div class="msg-card dt-quote"><div class="msg-icon">&#128140;</div><div class="msg-text">'+esc(dailyMsg())+'</div></div>';
}
function renderDesktop(){
  var anim=dtAnimate?' dt-anim':'';dtAnimate=false; // animate only on navigation, not edits
  var creColor=CAL_COLORS[creator]||'#c4506a';
  var h='<div class="dt" style="--cre:'+creColor+'">'+dtSidebar();
  h+='<section class="dt-list">'+dtListHeader()+'<div class="dt-add">'+renderAddForm()+'</div>'+dtList()+'</section>';
  h+='<section class="dt-detail'+anim+'">';
  h+=dtWhyCard();
  if(dtRightView==='allcal')h+='<div class="sec-lbl">Combined Calendar — all creators</div>'+renderAllCalendar();
  else if(dtRightView==='cal')h+='<div class="sec-lbl">'+esc((CREATORS[creator]||{name:''}).name)+' — Upload Schedule</div>'+(clips.length?renderCalendar():'<div class="dt-empty">No clips scheduled yet.</div>');
  else if(dtRightView==='inv'&&isSimple())h+=renderInvoicingTab();
  else { if(dtNextId)h+=dtQuoteCard(); h+=dtDetail(); }
  h+='</section></div>';
  document.getElementById('root').innerHTML=h;
  if(editField){var el=document.getElementById('fe_'+editField.id+'_'+editField.field);if(el){el.focus();if(el.tagName==='TEXTAREA')el.setSelectionRange(el.value.length,el.value.length);}}
}

function render(){
  if(isDesktop()){renderDesktop();return;}
  if(creator==='ALL'){renderAllView();return;}
  var next=isSimple()?getNextSimple():getNext();
  var counts=isSimple()?null:getCounts();
  var done=isSimple()?doneClipsSimple():doneClips();
  var cr=CREATORS[creator];
  var h='';

  h+='<div class="header-sticky">';
  h+='<div class="topbar"><div class="brand">';
  h+='<div class="brand-mark" style="background:'+cr.grad+'">'+cr.initials+'</div>';
  h+='<span class="brand-name">'+cr.name+'</span></div>';
  h+='<div class="topstats">';
  if(isSimple()){
    var pendingN=clips.filter(function(c){return !clipUploadedSimple(c);}).length;
    h+='<div class="tstat"><span class="tdot" style="background:var(--rose)"></span>'+pendingN+' to upload</div>';
    h+='<div class="tstat"><span class="tdot" style="background:var(--green)"></span>'+done.length+' uploaded</div>';
  } else {
    h+='<div class="tstat"><span class="tdot" style="background:var(--rose)"></span>'+counts.upload+' upload</div>';
    h+='<div class="tstat"><span class="tdot" style="background:var(--teal)"></span>'+counts.promote+' promote</div>';
    h+='<div class="tstat"><span class="tdot" style="background:var(--violet)"></span>'+(counts.desc+counts.title+counts.keywords)+' write</div>';
    h+='<div class="tstat"><span class="tdot" style="background:var(--green)"></span>'+counts.done+' done</div>';
  }
  h+='</div></div>';

  h+='<div class="creator-bar"><span class="creator-bar-lbl">Creator</span>';
  Object.keys(CREATORS).forEach(function(key){
    var c2=CREATORS[key];var isActive=key===creator;
    h+='<button class="cpill'+(isActive?' active':'')+'" style="'+(isActive?'background:'+c2.grad+';':'')+'" onclick="switchCreator(\''+key+'\')">';
    h+='<span class="cpill-dot" style="background:'+(isActive?'rgba(255,255,255,.6)':'var(--border)')+'"></span>';
    h+=c2.name+'</button>';
  });
  h+='<span style="margin-left:auto;display:flex;gap:6px">';
  h+='<button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="exportData()" title="Save a backup of all your clip and timer data">&#11015; Backup</button>';
  h+='<button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="importData()" title="Restore data from a backup file">&#11014; Restore</button>';
  h+='</span>';
  h+='</div>';
  h+='</div>';

  h+='<div class="goal-wrap">';
  if(cr.isMe){
    h+='<div class="goal-card"><div class="goal-icon">&#10024;</div>';
    h+='<div><div class="goal-eyebrow">Your why</div>';
    h+='<div class="goal-body">Make my <em>inner child</em> feel financially secure.</div></div></div>';
    h+='<div class="msg-card"><div class="msg-icon">&#128140;</div>';
    h+='<div class="msg-text">'+esc(dailyMsg())+'</div></div>';
  } else {
    h+='<div class="goal-card client-card"><div class="goal-icon">&#128204;</div>';
    h+='<div><div class="goal-eyebrow">Consulting client</div>';
    h+='<div class="goal-body">Managing content for <em>'+esc(cr.name)+'</em></div></div></div>';
  }
  h+='</div>';

  if(isSimple())h+=renderTimerWidget();
  if(isSimple())h+=renderInvoicingBanners();

  h+='<div class="tabs">';
  h+='<button class="tab'+(tab==='queue'?' active':'')+'" onclick="tab=\'queue\';render()">Do This Next</button>';
  h+='<button class="tab'+(tab==='pipe'?' active':'')+'" onclick="tab=\'pipe\';render()">Pipeline</button>';
  h+='<button class="tab'+(tab==='cal'?' active':'')+'" onclick="tab=\'cal\';render()">Calendar</button>';
  if(isSimple())h+='<button class="tab'+(tab==='inv'?' active':'')+'" onclick="tab=\'inv\';render()">Invoicing</button>';
  h+='</div><div class="page">';

  if(tab==='queue'){
    h+='<div class="sec-lbl">Do This Next</div>';
    if(!next){
      if(!clips.length){
        h+='<div class="empty-state"><div class="big">&#128203;</div>';
        h+='<p>No clips yet for '+esc(cr.name)+'.</p>';
        h+='<small>Add the first one below to get started.</small></div>';
      } else {
        h+='<div class="all-clear"><div class="big">&#127881;</div><p>All caught up'+(cr.isMe?'. She\'s so proud of you.':'.')+'</p></div>';
      }
    } else {
      var col=TCOLOR[next.type]||'var(--faint)';
      var isOpen=expanded===next.clip.id;
      h+='<div class="dtn-card">';
      h+='<div class="dtn-top" onclick="expanded=expanded==='+next.clip.id+'?false:'+next.clip.id+';editField=null;render()">';
      h+='<div class="dtn-left">';
      h+='<div class="dtn-eyebrow" style="color:'+col+'"><span class="dtn-pulse" style="background:'+col+'"></span>';
      h+=esc((TLABEL[next.type]||'').toUpperCase())+'</div>';
      h+='<div class="dtn-action">'+esc(actionTitle(next))+'</div>';
      h+='<div class="dtn-clip">';
      h+=isSimple()&&next.clip.num?'<span class="id-badge">'+esc(next.clip.num)+'</span>':'<span class="id-badge">'+fid(next.clip.id)+'</span>';
      h+=esc(next.clip.title);
      if(next.clip.length)h+=' &middot; '+esc(next.clip.length);
      if((next.type==='upload'||next.type==='promote')&&next.pl&&next.clip.platformDates&&next.clip.platformDates[next.pl])
        h+=' &middot; scheduled '+fmtDate(next.clip.platformDates[next.pl]);
      h+='</div></div>';
      h+='<div class="dtn-chev'+(isOpen?' open':'')+'">&#9662;</div></div>';
      if(isOpen){
        h+='<div class="dtn-body open"><div class="dtn-divider"></div>';
        h+=renderActionPanel(next);
        h+='<div class="sep"></div>';
        h+=renderField(next.clip,'title','Title','Clip title…');
        if(!isSimple()){
          h+=renderField(next.clip,'desc','Description','No description yet');
          h+=renderField(next.clip,'keywords','Keywords','No keywords yet');
          h+=renderAssets(next.clip);
        }
        h+=renderPlatforms(next.clip);
        h+=renderField(next.clip,'notes','Notes','Any notes…');
        h+='<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">';
        h+='<button class="btn btn-del" onclick="doRemove('+next.clip.id+')">Remove clip</button></div></div>';
      }
      h+='</div>';
      if(!isSimple()){
        var same=clips.filter(function(c){var s=getClipStep(c);return s&&s.type===next.type&&c.id!==next.clip.id;});
        if(same.length)h+='<div class="ctx-line">+'+same.length+' more clip'+(same.length>1?'s':'')+' also need this &mdash; <a onclick="tab=\'pipe\';render()">see pipeline</a></div>';
      }
    }
    if(!isSimple()){
      var cats=[
        {l:'Upload',n:counts.upload,c:'var(--rose)'},{l:'Promote',n:counts.promote,c:'var(--teal)'},
        {l:'Description',n:counts.desc,c:'var(--violet)'},{l:'Title',n:counts.title,c:'var(--violet)'},
        {l:'Keywords',n:counts.keywords,c:'var(--violet)'},{l:'Assets',n:counts.assets,c:'var(--amber)'},
        {l:'Edit',n:counts.edit,c:'var(--sky)'},{l:'Film',n:counts.film,c:'var(--faint)'}
      ].filter(function(x){return x.n>0;});
      if(cats.length){
        h+='<div class="sec-lbl">What\'s Coming</div><div class="coming-grid">';
        cats.forEach(function(cat){
          h+='<div class="coming-cell" onclick="tab=\'pipe\';render()">';
          h+='<div class="coming-n" style="color:'+cat.c+'">'+cat.n+'</div>';
          h+='<div class="coming-lbl">'+cat.l+'</div></div>';
        });
        h+='</div>';
      }
    }
    h+=renderAddForm();

  } else if(tab==='pipe'){
    h+='<div class="sec-lbl">Pipeline</div>';
    if(isSimple()){
      // Search bar
      h+='<div style="padding:0 0 14px 0">';
      h+='<div class="field-lbl">Search clips</div>';
      h+='<input type="text" id="pipe-search" value="'+esc(pipeSearch)+'" oninput="pipeSearch=this.value;render();var el=document.getElementById(\'pipe-search\');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}" style="width:100%;box-sizing:border-box;padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px">';
      if(pipeSearch)h+='<div style="font-size:12px;color:var(--muted);margin-top:6px">Results for &ldquo;'+esc(pipeSearch)+'&rdquo; &mdash; <a onclick="pipeSearch=\'\';render()" style="cursor:pointer;color:var(--accent)">clear</a></div>';
      h+='</div>';

      var filteredClips=pipeSearch?clips.filter(function(c){var q=pipeSearch.toLowerCase();return c.title.toLowerCase().indexOf(q)>=0||(c.num&&c.num.toLowerCase().indexOf(q)>=0);}):clips;

      function clipRowS(c,showAction){
        var pp=firstIn(c,P)||PL[0];
        var dv=c.platformDates&&c.platformDates[pp]?fmtDate(c.platformDates[pp]):'No date set';
        var isExp=expanded===c.id;
        var rh='<div class="pipe-clip-row" onclick="expanded=expanded==='+c.id+'?false:'+c.id+';editField=null;render()">';
        rh+=c.num?'<span class="id-badge">'+esc(c.num)+'</span>':'';
        rh+='<span class="pipe-clip-name">'+esc(c.title)+(c.length?' <span style="color:var(--faint);font-size:13px;font-weight:400">&middot; '+esc(c.length)+'</span>':'')+'</span>';
        if(showAction)rh+='<span class="pipe-clip-sub">'+esc(dv)+'</span>';
        rh+='<span style="color:var(--faint);font-size:13px;margin-left:auto">'+(isExp?'&#9650;':'&#9660;')+'</span></div>';
        if(isExp){
          rh+='<div style="padding:16px 18px 18px;border-top:1px solid var(--border);background:var(--bg)">';
          if(showAction)rh+=renderActionPanel({type:'upload',clip:c,pl:pp||PL[0]});
          rh+=renderPlatforms(c);
          rh+=renderField(c,'title','Title','Clip title…');
          rh+=renderField(c,'desc','Description','No description yet');
          rh+=renderField(c,'num','Clip #','e.g. 101');
          rh+=renderField(c,'length','Length','e.g. 15:52');
          rh+=renderField(c,'notes','Notes','Any notes…');
          rh+='<div style="margin-top:12px"><button class="btn btn-del" onclick="event.stopPropagation();doRemove('+c.id+')">Remove clip</button></div>';
          rh+='</div>';
        }
        return rh;
      }
      function pipeGrp(gk,icon,label,col,items,showAction){
        if(!items.length)return '';
        var isOG=openGroups[gk]!==false;
        var gh='<div class="pipe-group">';
        gh+='<div class="pipe-group-head" onclick="openGroups[\''+gk+'\']= !openGroups[\''+gk+'\'];render()">';
        gh+='<div class="pipe-group-label" style="color:'+col+'">'+icon+' '+label+'<span class="pipe-group-n">'+items.length+'</span></div>';
        gh+='<div class="pipe-group-chev'+(isOG?' open':'')+'">&#9662;</div></div>';
        if(isOG){gh+='<div class="pipe-group-body open">';items.forEach(function(c){gh+=clipRowS(c,showAction);});gh+='</div>';}
        gh+='</div>';return gh;
      }
      if(!clips.length)h+='<div class="empty-state"><div class="big">&#128203;</div><p>No clips yet.</p><small>Add clips below.</small></div>';
      if(platformsFor(creator).length>1){
        var needsC4S=filteredClips.filter(function(c){return c.platforms['C4S']===P;});
        var needsLF=filteredClips.filter(function(c){return c.platforms['C4S']!==P&&platformsFor(creator).some(function(pl){return pl!=='C4S'&&c.platforms[pl]===P;});});
        var filteredDone=filteredClips.filter(function(c){return clipUploadedSimple(c);});
        needsC4S.sort(function(a,b){var da=a.platformDates&&a.platformDates['C4S']||'9999';var db=b.platformDates&&b.platformDates['C4S']||'9999';return da<db?-1:da>db?1:0;});
        needsLF.sort(function(a,b){var da=a.platformDates&&a.platformDates['LF']||'9999';var db=b.platformDates&&b.platformDates['LF']||'9999';return da<db?-1:da>db?1:0;});
        h+=pipeGrp('needsC4S','&#11014;&#65039;','Upload to C4S','var(--rose)',needsC4S,true);
        h+=pipeGrp('needsLF','&#11014;&#65039;','Upload to LF','var(--amber)',needsLF,true);
        h+=pipeGrp('allDone','&#9733;','Uploaded Everywhere','var(--green)',filteredDone,false);
      } else {
        var toUpload2=filteredClips.filter(function(c){return !clipUploadedSimple(c);});
        var filteredDone2=filteredClips.filter(function(c){return clipUploadedSimple(c);});
        var sp=platformsFor(creator)[0];
        toUpload2.sort(function(a,b){var da=a.platformDates&&a.platformDates[sp]||'9999';var db=b.platformDates&&b.platformDates[sp]||'9999';return da<db?-1:da>db?1:0;});
        h+=pipeGrp('toUpload','&#11014;&#65039;','To Upload','var(--rose)',toUpload2,true);
        h+=pipeGrp('allDone','&#9733;','Uploaded','var(--green)',filteredDone2,false);
      }
    } else {
      // LG clips are individually expandable/editable (mirrors BH/LV's clipRowS).
      // Edit-focused: fields + assets + platforms; actions stay in "Do This Next".
      function clipRowLG(c){
        var s=getClipStep(c);
        var sub=s&&s.pl?' → '+s.pl:'';
        var isExp=expanded===c.id;
        var rh='<div class="pipe-clip-row" onclick="expanded=expanded==='+c.id+'?false:'+c.id+';editField=null;render()">';
        rh+='<span class="id-badge">'+fid(c.id)+'</span>';
        rh+='<span class="pipe-clip-name">'+esc(c.title)+'</span>';
        if(sub)rh+='<span class="pipe-clip-sub">'+esc(sub)+'</span>';
        rh+='<span style="color:var(--faint);font-size:13px;margin-left:auto">'+(isExp?'&#9650;':'&#9660;')+'</span></div>';
        if(isExp){
          rh+='<div style="padding:16px 18px 18px;border-top:1px solid var(--border);background:var(--bg)">';
          if(s){rh+=renderActionPanel(s);rh+='<div class="sep"></div>';}
          rh+=renderField(c,'title','Title','Clip title…');
          rh+=renderField(c,'desc','Description','No description yet');
          rh+=renderField(c,'keywords','Keywords','No keywords yet');
          rh+=renderField(c,'num','Clip #','e.g. 101');
          rh+=renderField(c,'length','Length','e.g. 15:52');
          rh+=renderAssets(c);
          rh+=renderPlatforms(c);
          rh+=renderField(c,'notes','Notes','Any notes…');
          rh+='<div style="margin-top:12px"><button class="btn btn-del" onclick="event.stopPropagation();doRemove('+c.id+')">Remove clip</button></div>';
          rh+='</div>';
        }
        return rh;
      }
      var groups=[
        {types:['upload'],icon:'&#11014;&#65039;',label:'Ready to Upload',col:'var(--rose)'},
        {types:['promote'],icon:'&#9733;',label:'Ready to Promote',col:'var(--teal)'},
        {types:['write-desc'],icon:'&#9997;&#65039;',label:'Needs Description',col:'var(--violet)'},
        {types:['write-title'],icon:'&#127991;&#65039;',label:'Needs Title',col:'var(--violet)'},
        {types:['write-keywords'],icon:'&#128273;',label:'Needs Keywords',col:'var(--violet)'},
        {types:['make-thumbnail','make-nfgbcover','make-preview'],icon:'&#128444;&#65039;',label:'Needs Assets',col:'var(--amber)'},
        {types:['edit'],icon:'&#9986;&#65039;',label:'Needs Editing',col:'var(--sky)'},
        {types:['film'],icon:'&#128161;',label:'Ideas to Film',col:'var(--faint)'}
      ];
      var anyGroups=false;
      groups.forEach(function(grp){
        var items=clipsForTypes(grp.types);if(!items.length)return;
        anyGroups=true;
        var gk=grp.label;var isOpen=openGroups[gk]!==false;
        h+='<div class="pipe-group">';
        h+='<div class="pipe-group-head" onclick="openGroups[\''+gk+'\']=!openGroups[\''+gk+'\'];render()">';
        h+='<div class="pipe-group-label" style="color:'+grp.col+'">'+grp.icon+' '+grp.label+'<span class="pipe-group-n">'+items.length+'</span></div>';
        h+='<div class="pipe-group-chev'+(isOpen?' open':'')+'">&#9662;</div></div>';
        if(isOpen){
          h+='<div class="pipe-group-body open">';
          items.forEach(function(c){h+=clipRowLG(c);});
          h+='</div>';
        }
        h+='</div>';
      });
      if(!anyGroups&&!clips.length)h+='<div class="empty-state"><div class="big">&#128203;</div><p>No clips yet.</p><small>Add clips using the button below.</small></div>';
      if(done.length){
        var doneOpen=openGroups['lgDone']===true; // collapsed by default
        h+='<div class="pipe-group">';
        h+='<div class="pipe-group-head" onclick="openGroups[\'lgDone\']=!openGroups[\'lgDone\'];render()">';
        h+='<div class="pipe-group-label" style="color:var(--green)">&#9733; All Done<span class="pipe-group-n">'+done.length+'</span></div>';
        h+='<div class="pipe-group-chev'+(doneOpen?' open':'')+'">&#9662;</div></div>';
        if(doneOpen){
          h+='<div class="pipe-group-body open">';
          done.forEach(function(c){h+=clipRowLG(c);});
          h+='</div>';
        }
        h+='</div>';
      }
    }
    h+=renderAddForm();

  } else if(tab==='inv'&&isSimple()){
    h+=renderInvoicingTab();

  } else {
    h+='<div class="sec-lbl">Upload Schedule</div>';
    if(!clips.length){
      h+='<div class="empty-state"><div class="big">&#128197;</div><p>No clips scheduled yet.</p></div>';
      h+=renderAddForm();
    } else {
      h+=renderCalendar();
      h+=renderAddForm();
    }
  }

  h+='</div>';
  document.getElementById('root').innerHTML=h;

  if(editField){
    var el=document.getElementById('fe_'+editField.id+'_'+editField.field);
    if(el){el.focus();if(el.tagName==='TEXTAREA')el.setSelectionRange(el.value.length,el.value.length);}
  }
  if(addingNew){var inp=document.getElementById('new-title');if(inp)inp.focus();}
}

function doAdd(){
  var g=function(id){return document.getElementById(id);};
  var t=g('new-title'),s=g('new-status'),n=g('new-num'),l=g('new-length'),d=g('new-date');
  var ty=g('new-type'),de=g('new-desc'),k=g('new-keywords');
  doAddClip(t?t.value:'',s?s.value:'idea',n?n.value:'',l?l.value:'',d?d.value:'',
    ty?ty.value:'clip',de?de.value:'',k?k.value:'');
}

// init
// Boot is now driven by firebase-sync.js after login (loadCreator();loadConsulting();render();)

}catch(err){
  document.getElementById('root').innerHTML='<div class="err-box">Error: '+err.message+'\n\n'+err.stack+'</div>';
}
</script>
<script>
/* ==========================================================================
   firebase-sync.js  —  durable cloud storage + login for the LG Dashboard
   --------------------------------------------------------------------------
   Replaces the app's localStorage-only persistence with Firebase Firestore.
   Design goals:
     • Minimal change to the existing app: it exposes a global `store` object
       with the SAME API as localStorage (getItem / setItem / removeItem),
       so the app only needs `localStorage` swapped for `store` in its four
       storage functions.
     • Instant reads: localStorage is kept as a fast local cache.
     • Durable + synced: every write is mirrored to Firestore (debounced),
       and remote changes stream back in real time (phone <-> computer).
     • Private: nothing loads until the user signs in; Firestore rules lock
       the data to the signed-in account (see firestore.rules).

   See MIGRATION-GUIDE.md for setup + the exact edits to index.html.
   This file can be loaded with <script src="firebase-sync.js"><\/script>
   AFTER the main app <script>, or pasted inline as its own <script> block.
   ========================================================================== */
(function () {
  // 1) -------- YOUR FIREBASE CONFIG -----------------------------------------
  //    Firebase console -> Project settings -> "Your apps" -> Web app -> Config.
  //    NOTE: apiKey is an identifier, NOT a secret. It is safe in client code.
  //    Real security comes from Firebase Auth + Firestore rules.
  var firebaseConfig = {
    apiKey:            "AIzaSyCiAxJwjlwUOn7NDsjEejHwo-1eObllu1E",
    authDomain:        "productive-as-fuck.firebaseapp.com",
    projectId:         "productive-as-fuck",
    storageBucket:     "productive-as-fuck.firebasestorage.app",
    messagingSenderId: "836342779433",
    appId:             "1:836342779433:web:64d376be0594a1d0cb9638"
  };

  // 2) -------- The localStorage keys this app persists ----------------------
  //    (LG clips ARE saved; LG consulting is intentionally ephemeral, so it
  //     is not listed here — that mirrors the app's existing behavior.)
  var SYNC_KEYS = [
    'lg-v8-LG', 'lg-v8-BH', 'lg-v8-LV',
    'lg-consulting-BH', 'lg-consulting-LV'
  ];

  // 3) -------- Init Firebase (compat SDK, no build step needed) -------------
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db   = firebase.firestore();
  // Offline cache so the app still works without a connection.
  try { db.enablePersistence({ synchronizeTabs: true }); } catch (e) { /* multi-tab or unsupported */ }

  var uid = null;
  var writeTimers = {};

  function docRef(key) {
    // users/{uid}/kv/{key}  ->  { value: "<json string>", updated: <ts> }
    return db.collection('users').doc(uid).collection('kv').doc(key);
  }

  // 4) -------- `store`: drop-in replacement for localStorage ----------------
  //    Reads come from the local cache (synchronous, instant).
  //    Writes update the cache AND push to Firestore, debounced per key.
  var store = {
    getItem: function (k) { return localStorage.getItem(k); },
    setItem: function (k, v) {
      localStorage.setItem(k, v);                 // instant local cache
      if (!uid) return;                            // not signed in yet
      clearTimeout(writeTimers[k]);
      writeTimers[k] = setTimeout(function () {
        docRef(k).set({
          value: v,
          updated: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(function (e) { console.warn('cloud save failed for', k, e); });
      }, 700);
    },
    removeItem: function (k) {
      localStorage.removeItem(k);
      if (uid) docRef(k).delete().catch(function () {});
    }
  };
  window.store = store;

  // 5) -------- Pull cloud data down on login, then live-sync ----------------
  function hydrate() {
    var jobs = SYNC_KEYS.map(function (k) {
      return docRef(k).get().then(function (snap) {
        var data = snap.exists ? snap.data() : null;
        if (data && typeof data.value === 'string') {
          // Cloud is the source of truth on load.
          localStorage.setItem(k, data.value);
        } else if (localStorage.getItem(k) != null) {
          // First run on a device that already has local data and the cloud
          // is empty -> seed the cloud from local (one-time migration).
          return docRef(k).set({
            value: localStorage.getItem(k),
            updated: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      });
    });
    return Promise.all(jobs).then(startListeners);
  }

  // Keep the local cache fresh across devices and re-render if the change
  // affects the creator currently on screen.
  function startListeners() {
    SYNC_KEYS.forEach(function (k) {
      docRef(k).onSnapshot(function (snap) {
        if (snap.metadata.hasPendingWrites) return;       // ignore our own writes
        var data = snap.exists ? snap.data() : null;
        if (data && typeof data.value === 'string' &&
            localStorage.getItem(k) !== data.value) {
          localStorage.setItem(k, data.value);
          var c = (typeof creator !== 'undefined') ? creator : null;
          if (c && (k === 'lg-v8-' + c || k === 'lg-consulting-' + c)) {
            if (typeof loadCreator === 'function')    loadCreator();
            if (typeof loadConsulting === 'function') loadConsulting();
            if (typeof render === 'function')         render();
          }
        }
      });
    });
  }

  // 6) -------- Simple login gate -------------------------------------------
  function showLogin(message) {
    if (document.getElementById('login-overlay')) {
      if (message) document.getElementById('lg-login-msg').textContent = message;
      return;
    }
    var o = document.createElement('div');
    o.id = 'login-overlay';
    o.style.cssText = 'position:fixed;inset:0;background:#fdf8f5;z-index:9999;' +
      'display:flex;align-items:center;justify-content:center;' +
      'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    o.innerHTML =
      '<div style="background:#fff;border:1px solid #ede4de;border-radius:16px;' +
        'padding:32px;width:320px;box-shadow:0 6px 24px rgba(80,30,20,.1)">' +
        '<div style="font-size:20px;font-weight:700;color:#2a1f1c;margin-bottom:18px">Sign in</div>' +
        '<label for="lg-email" style="display:block;font-size:13px;color:#7a6a63;margin-bottom:5px">Email</label>' +
        '<input id="lg-email" type="email" autocomplete="username" ' +
          'style="width:100%;padding:11px 14px;margin-bottom:10px;border:1.5px solid #ede4de;' +
          'border-radius:10px;font-size:15px;box-sizing:border-box">' +
        '<label for="lg-pass" style="display:block;font-size:13px;color:#7a6a63;margin-bottom:5px">Password</label>' +
        '<input id="lg-pass" type="password" autocomplete="current-password" ' +
          'style="width:100%;padding:11px 14px;margin-bottom:14px;border:1.5px solid #ede4de;' +
          'border-radius:10px;font-size:15px;box-sizing:border-box">' +
        '<button id="lg-login-btn" style="width:100%;padding:12px;border:none;border-radius:10px;' +
          'background:#c4506a;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Sign in</button>' +
        '<div id="lg-login-msg" style="color:#c4506a;font-size:13px;margin-top:10px;min-height:16px">' +
          (message || '') + '</div>' +
      '</div>';
    document.body.appendChild(o);

    function submit() {
      var e = document.getElementById('lg-email').value.trim();
      var p = document.getElementById('lg-pass').value;
      document.getElementById('lg-login-msg').textContent = 'Signing in…';
      auth.signInWithEmailAndPassword(e, p).catch(function (err) {
        document.getElementById('lg-login-msg').textContent = err.message;
      });
    }
    document.getElementById('lg-login-btn').onclick = submit;
    document.getElementById('lg-pass').addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter') submit();
    });
  }
  function hideLogin() {
    var o = document.getElementById('login-overlay');
    if (o) o.remove();
  }

  // 7) -------- Boot: wait for auth, hydrate, then hand off to the app -------
  //    The app's own boot line (loadCreator();loadConsulting();render();) must
  //    be REMOVED from index.html — this drives the first render after login.
  auth.onAuthStateChanged(function (user) {
    if (user) {
      uid = user.uid;
      hideLogin();
      hydrate()
        .then(function () {
          if (typeof loadCreator === 'function')    loadCreator();
          if (typeof loadConsulting === 'function') loadConsulting();
          if (typeof render === 'function')         render();
        })
        .catch(function (e) {
          console.error('hydrate failed', e);
          // Fall back to local cache so the app still opens.
          if (typeof loadCreator === 'function')    loadCreator();
          if (typeof loadConsulting === 'function') loadConsulting();
          if (typeof render === 'function')         render();
        });
    } else {
      uid = null;
      showLogin();
    }
  });

  // Optional: expose a sign-out helper you can wire to a button later.
  window.lgSignOut = function () { auth.signOut(); };
})();
</script>

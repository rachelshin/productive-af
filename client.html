<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Content Dashboard</title>
<style>
  :root{
    --bg:#fdf8f5; --surface:#ffffff; --border:#ece2db; --text:#241a17;
    --muted:#7a6a63; --faint:#b3a298; --rose:#c4506a; --amber:#bd8a2e;
    --green:#2f8a5f; --violet:#6a6ab5; --teal:#2f8a7d;
    --accent:#c4506a;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  input,button{font-size:16px;font-family:inherit}
  input,textarea,select{outline:none !important;box-shadow:none !important}
  *:focus,*:focus-visible{outline:none !important}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}

  /* ---- header ---- */
  .appbar{position:sticky;top:0;z-index:20;color:#fff;
    padding:calc(var(--safe-top) + 14px) 18px 14px;display:flex;align-items:center;gap:13px}
  .appbar .av{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex:none}
  .appbar .nm{font-size:19px;font-weight:800;line-height:1.1}
  .appbar .sub{font-size:12.5px;opacity:.9;font-weight:600;letter-spacing:.02em}
  .appbar .signout{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;border:none;
    border-radius:10px;padding:8px 13px;font-weight:700;cursor:pointer;font-size:13px;flex:none}

  /* ---- scroll area ---- */
  .scroll{padding:16px 14px calc(var(--safe-bot) + 88px)}
  .sec-lbl{font-size:13px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
    color:var(--faint);margin:22px 4px 11px}
  .sec-lbl:first-child{margin-top:6px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:15px;
    padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 2px rgba(60,30,20,.03)}
  .empty{text-align:center;color:var(--faint);font-size:15px;padding:26px 14px}

  /* ---- chips: SOLID + white text, high contrast ---- */
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:800;
    border-radius:999px;padding:5px 13px;color:#fff;letter-spacing:.01em}
  .chip.c4s{background:var(--rose)}
  .chip.lf{background:var(--amber)}
  /* a platform that isn't scheduled yet reads lighter, still in its own site colour */
  .chip.light.c4s{background:#f0cdd5;color:#a83b54}
  .chip.light.lf{background:#ecdcb0;color:#8a611c}
  .chip .dt{font-weight:700;opacity:.92;font-size:13px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}

  /* ---- clip rows (Database) ---- */
  .row,.clip-head{display:flex;align-items:center;gap:11px}
  .clip-head{cursor:pointer}
  .row .ttl,.clip-head .ttl{font-weight:700;font-size:16px;flex:1;min-width:0}
  .row .id,.clip-head .id{font-size:13px;font-weight:800;color:var(--muted);
    background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px 9px;flex:none}
  .clip-caret{font-size:16px;color:var(--muted);flex:none;line-height:1}
  .clip-body{margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
  .clip-body>:first-child{margin-top:0}
  .dlbl{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
    color:var(--faint);margin:15px 0 7px}
  /* ---- Database accordion headers ---- */
  .db-head{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--border);border-radius:13px;
    padding:14px 16px;margin-bottom:11px;font-size:16px;font-weight:800;color:var(--text);
    cursor:pointer;-webkit-appearance:none}
  .db-caret{font-size:16px;color:var(--muted);width:15px;flex:none;line-height:1}
  .db-count{margin-left:auto;font-size:14px;font-weight:800;color:var(--muted);
    background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 12px}

  /* not-yet-uploaded clips read lighter / softer than the crisp "uploaded" ones */
  .card.todo{background:#faf3ed;border-color:#efe5dd;box-shadow:none}
  .card.todo .ttl{color:#9b897f}
  .card.todo .id{color:#b8a89f;background:#f5ede7}

  /* ---- calendar ---- */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 14px}
  .cal-nav .mlabel{font-size:18px;font-weight:800}
  .cal-nav button{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);font-size:20px;font-weight:800;cursor:pointer}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-size:12px;font-weight:800;color:var(--faint);padding-bottom:4px}
  .cal-cell{aspect-ratio:1/1.08;border-radius:11px;background:var(--surface);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
  .cal-cell.blank{background:transparent;border:none}
  /* day fill is set inline: hue = site (C4S rose / LF amber), opacity = status */
  .cal-cell.has{cursor:pointer}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--accent)}
  .cal-cell.sel{box-shadow:inset 0 0 0 2.5px var(--text)}
  .cal-cell .dnum{font-size:15px;font-weight:700;color:var(--text)}
  .cal-cell.today .dnum{color:var(--accent);font-weight:800}
  .cal-legend{display:flex;gap:20px;justify-content:center;margin:15px 0 0;
    font-size:13px;font-weight:700;color:var(--muted)}
  .cal-legend>span{display:inline-flex;align-items:center;gap:7px}
  .cal-legend .sw{width:15px;height:15px;border-radius:5px;border:1px solid rgba(0,0,0,.06)}

  /* ---- day detail (read-only) ---- */
  .ptag{margin-top:9px;font-size:13px;font-weight:700;color:var(--muted)}
  .salegrid{display:flex;gap:9px}
  .stat{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:11px;
    padding:11px 8px;text-align:center}
  .stat .sv{font-size:18px;font-weight:800}
  .stat .sl{font-size:12px;font-weight:700;color:var(--muted);margin-top:3px}
  .fval{font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word}

  /* ---- invoicing progress ---- */
  .prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
  .prog-since{font-size:15px;font-weight:700}
  .prog-pct{font-size:19px;font-weight:800;color:var(--accent)}
  .prog-bar{height:14px;border-radius:999px;background:var(--bg);border:1px solid var(--border);overflow:hidden}
  .prog-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .35s ease}
  .prog-fill.done{background:var(--green)}
  .prog-sub{margin-top:10px;font-size:14px;font-weight:700;color:var(--muted)}

  /* ---- invoices ---- */
  .inv{display:flex;align-items:center;gap:12px;padding:14px 15px}
  .inv .amt{font-weight:800;font-size:17px}
  .inv .per{font-size:13.5px;color:var(--muted);margin-top:2px}
  .badge{font-size:12px;font-weight:800;border-radius:999px;padding:4px 11px;margin-left:auto;flex:none}
  .badge.paid{color:var(--green);background:#eaf4ee}
  .badge.sent{color:var(--violet);background:#eeeef8}
  .badge.unsent{color:var(--muted);background:var(--bg)}

  /* ---- bottom tab bar ---- */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
    background:rgba(255,255,255,.94);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-top:1px solid var(--border);padding-bottom:var(--safe-bot)}
  .tab{flex:1;border:none;background:none;cursor:pointer;padding:9px 0 8px;
    display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint)}
  .tab .ti{font-size:21px;line-height:1}
  .tab .tl{font-size:11px;font-weight:800;letter-spacing:.02em}
  .tab.active{color:var(--accent)}

  /* ---- login ---- */
  #login{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;
    align-items:center;justify-content:center;padding:18px}
  #login .box{background:#fff;border:1px solid var(--border);border-radius:18px;
    padding:30px 26px;width:100%;max-width:340px;box-shadow:0 8px 30px rgba(80,30,20,.1)}
  #login h1{font-size:22px;font-weight:800;margin:0 0 6px}
  #login p{font-size:14px;color:var(--muted);margin:0 0 18px}
  #login label{font-size:13px;font-weight:700;color:var(--muted)}
  #login input{width:100%;padding:13px 14px;margin:5px 0 12px;border:1.5px solid var(--border);
    border-radius:11px;background:#fff;color:var(--text)}
  #login button{width:100%;padding:14px;border:none;border-radius:11px;background:var(--accent);
    color:#fff;font-weight:800;cursor:pointer}
  #login .msg{color:var(--rose);font-size:13px;margin-top:10px;min-height:16px}
  .loading{padding:70px 20px;text-align:center;color:var(--faint);font-size:17px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>

<script>
/* ============================================================================
   client.html — READ-ONLY client view (mobile-first).
   A client signs in and sees ONLY their own creator's data via three tabs:
   Calendar, Database (clip list), Invoicing. They cannot edit anything and
   never see other creators. Access is gated by a clientAccess/{uid} doc and the
   Firestore rules (see firestore.rules).
   ========================================================================== */
(function () {
  var firebaseConfig = {
    apiKey:            "AIzaSyCiAxJwjlwUOn7NDsjEejHwo-1eObllu1E",
    authDomain:        "productive-as-fuck.firebaseapp.com",
    projectId:         "productive-as-fuck",
    storageBucket:     "productive-as-fuck.firebasestorage.app",
    messagingSenderId: "836342779433",
    appId:             "1:836342779433:web:64d376be0594a1d0cb9638"
  };
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db   = firebase.firestore();

  // ---- static reference data (mirrors the main app) ------------------------
  var CREATORS = {
    LG:{name:'Lux Gray',     initials:'LG',grad:'linear-gradient(135deg,#d4637a,#9b7dbd)',accent:'#c4506a'},
    BH:{name:'Brigit Heart', initials:'BH',grad:'linear-gradient(135deg,#8b5fbf,#4a7fa5)',accent:'#6a6ab5'},
    LV:{name:'Lady Venus',   initials:'LV',grad:'linear-gradient(135deg,#3a8c80,#4a8c68)',accent:'#2f8a7d'}
  };
  var CREATOR_PLATFORMS = {LG:['SM','MFC','CB','SC','NF','SP','C4S'], BH:['LF','C4S'], LV:['C4S']};
  var PEND='pending', NA='na';
  var WEEKDAYS=['S','M','T','W','T','F','S'];
  var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // ---- app state -----------------------------------------------------------
  var gCreator=null, gClips=[], gConsulting=null;
  var tab='cal';
  var calY=new Date().getFullYear(), calM=new Date().getMonth();
  var selDay=null; // tapped calendar day -> shows that day's clip detail
  var dbOpen={todo:true, c4s:true, lf:false, up:false}; // Database accordion: which sections are expanded
  var clipOpen=null; // id of the expanded clip card in the Database tab

  // ---- helpers -------------------------------------------------------------
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function pad(n){ return (n<10?'0':'')+n; }
  function todayStr(){ return new Date().toLocaleDateString('en-CA'); }
  function ds(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
  function fmtDate(d){ if(!d) return ''; var p=d.split('-'); return MSHORT[parseInt(p[1],10)-1]+' '+parseInt(p[2],10); }
  function fmtRange(a,b){ if(!a&&!b) return ''; return fmtDate(a)+' – '+fmtDate(b); }
  function fmtHours(s){ var h=Math.floor(s/3600), m=Math.round((s%3600)/60); if(m===60){h++;m=0;} return h+(m>0?'h '+m+'m':'h'); }
  function platsFor(cr){ return CREATOR_PLATFORMS[cr]||['C4S']; }
  function clipUploaded(c, cr){ return platsFor(cr).every(function(pl){ return (c.platforms||{})[pl] !== PEND; }); }
  // site colour as an "r,g,b" string so the calendar can vary opacity by status
  function plRGB(pl){ return pl==='LF' ? '189,138,46' : pl==='C4S' ? '196,80,106' : '106,106,181'; }
  // one platform's chip for a clip. Site colour = identity; lighter when not yet
  // scheduled (pending, no date); a ✓ once uploaded (still the site colour, not green).
  function platChip(c, pl){
    var st = (c.platforms||{})[pl];
    if(st===NA) return '';
    var base = pl==='LF' ? 'lf' : 'c4s';
    var d = (c.platformDates||{})[pl];
    var dt = d ? '<span class="dt">'+esc(fmtDate(d))+'</span>' : '';
    if(st===PEND) return d
      ? '<span class="chip '+base+'">'+esc(pl)+dt+'</span>'        // scheduled
      : '<span class="chip '+base+' light">'+esc(pl)+'</span>';    // not scheduled yet
    return '<span class="chip '+base+'">'+esc(pl)+' ✓'+dt+'</span>'; // uploaded
  }

  // collect every dated platform event -> { 'YYYY-MM-DD': [ {pl,st,title,num} ] }
  function calEvents(clips, cr){
    var map={}, plats=platsFor(cr);
    clips.forEach(function(c){
      var dates=c.platformDates||{};
      plats.forEach(function(pl){
        var st=(c.platforms||{})[pl], d=dates[pl];
        if(!d || st===NA) return;
        if(pl==='LF' && (c.platforms||{})['C4S']===PEND) return; // LF hidden until C4S up
        (map[d]=map[d]||[]).push({pl:pl, st:st, title:c.title, num:c.num});
      });
    });
    return map;
  }

  // ---- tab: CALENDAR -------------------------------------------------------
  function renderCalendar(){
    var ev = calEvents(gClips, gCreator);
    var today = todayStr();
    var h = '<div class="cal-nav">'
      + '<button onclick="window.__mon(-1)">‹</button>'
      + '<span class="mlabel">'+MONTHS[calM]+' '+calY+'</span>'
      + '<button onclick="window.__mon(1)">›</button></div>';

    h += '<div class="cal-grid">';
    WEEKDAYS.forEach(function(w){ h += '<div class="cal-dow">'+w+'</div>'; });
    var startDow = new Date(calY, calM, 1).getDay();
    var daysIn = new Date(calY, calM+1, 0).getDate();
    for(var i=0;i<startDow;i++) h += '<div class="cal-cell blank"></div>';
    for(var d=1; d<=daysIn; d++){
      var key = ds(calY, calM, d);
      var evs = ev[key] || [];
      var cls = 'cal-cell', style = '', click = '';
      if(evs.length){
        // one clip per day; if somehow two, a pending one wins so the day never looks "done"
        var e = evs[0];
        for(var j=0;j<evs.length;j++){ if(evs[j].st===PEND){ e=evs[j]; break; } }
        // hue = site (C4S rose / LF amber); opacity = status (scheduled faint, uploaded solid)
        style = ' style="background:rgba('+plRGB(e.pl)+','+(e.st===PEND?'0.18':'0.72')+')"';
        cls += ' has';
        click = ' onclick="window.__day(\''+key+'\')"';
      }
      if(key===today) cls += ' today';
      if(key===selDay) cls += ' sel';
      h += '<div class="'+cls+'"'+style+click+'><span class="dnum">'+d+'</span></div>';
    }
    h += '</div>';
    // legend: row 1 = which site (only this creator's), row 2 = scheduled vs uploaded
    var sites = platsFor(gCreator).map(function(pl){
      return '<span><span class="sw" style="background:rgba('+plRGB(pl)+',.72)"></span>'+esc(pl)+'</span>';
    }).join('');
    h += '<div class="cal-legend">'+sites+'</div>'
      + '<div class="cal-legend" style="margin-top:9px">'
      + '<span><span class="sw" style="background:rgba(120,95,90,.18)"></span>Scheduled</span>'
      + '<span><span class="sw" style="background:rgba(120,95,90,.72)"></span>Uploaded</span></div>';
    // the tapped day's clip detail appears right under the grid
    var sc = selDay ? clipForDay(selDay) : null;
    if(sc) h += '<div id="dayDetail">'+renderDayDetail(sc, selDay)+'</div>';
    return h;
  }

  // find the single clip scheduled on a given day (mirrors the calendar's visibility)
  function clipForDay(d){
    var plats = platsFor(gCreator);
    for(var i=0;i<gClips.length;i++){
      var c = gClips[i], dates = c.platformDates || {};
      for(var k=0;k<plats.length;k++){
        var pl = plats[k];
        if(dates[pl]===d && (c.platforms||{})[pl]!==NA){
          if(pl==='LF' && (c.platforms||{})['C4S']===PEND) continue; // LF hidden until C4S up
          return c;
        }
      }
    }
    return null;
  }
  function dfield(label, val){
    if(val==null || val==='') return '';
    return '<div class="dlbl">'+label+'</div><div class="fval">'+esc(val)+'</div>';
  }
  // shared read-only body of a clip: platforms, sales (if any), then text fields
  function clipBody(c){
    var h = '';
    if(c.type==='photoset') h += '<div class="ptag">📷 Photoset</div>';
    h += '<div class="chips">'+platsFor(gCreator).map(function(pl){ return platChip(c, pl); }).join('')+'</div>';
    if(c.totalSales || c.clipsSold || c.price){
      var stat = function(label, val){ return '<div class="stat"><div class="sv">'+esc(val||'—')+'</div><div class="sl">'+label+'</div></div>'; };
      h += '<div class="dlbl">Sales</div><div class="salegrid">'
         + stat('Total sales', c.totalSales) + stat('Clips sold', c.clipsSold) + stat('Price', c.price) + '</div>';
    }
    h += dfield('Description', c.desc);
    h += dfield('Keywords', (c.keywords && c.keywords.length) ? c.keywords.join(', ') : '');
    h += dfield('Length', c.length);
    h += dfield('Notes', c.notes);
    return h;
  }
  // full detail for the clip scheduled on the tapped calendar day (always expanded)
  function renderDayDetail(c, d){
    return '<div class="sec-lbl" style="margin-top:20px">Scheduled · '+esc(fmtDate(d))+'</div>'
      + '<div class="card"><div class="row">'
      + '<span class="id">'+esc(c.num || ('#'+c.id))+'</span>'
      + '<span class="ttl">'+esc(c.title)+'</span></div>'
      + '<div class="clip-body">'+clipBody(c)+'</div></div>';
  }

  // ---- tab: DATABASE -------------------------------------------------------
  // collapsed: just ID# + title; tap to expand the full details, tap again to close
  function clipCard(c){
    var up = clipUploaded(c, gCreator);
    var open = (clipOpen === c.id);
    var h = '<div class="card'+(up?'':' todo')+'">'
      + '<div class="clip-head" onclick="window.__clip('+c.id+')">'
      + '<span class="id">'+esc(c.num || ('#'+c.id))+'</span>'
      + '<span class="ttl">'+esc(c.title)+'</span>'
      + '<span class="clip-caret">'+(open?'&#9662;':'&#9656;')+'</span></div>';
    if(open) h += '<div class="clip-body">'+clipBody(c)+'</div>';
    return h + '</div>';
  }
  function dbSection(key, label, list, emptyMsg){
    var open = dbOpen[key];
    var h = '<button class="db-head" onclick="window.__db(\''+key+'\')">'
      + '<span class="db-caret">'+(open?'&#9662;':'&#9656;')+'</span>'+label
      + '<span class="db-count">'+list.length+'</span></button>';
    if(open) h += list.length ? list.map(clipCard).join('')
      : '<div class="card"><div class="empty">'+emptyMsg+'</div></div>';
    return h;
  }
  function renderDatabase(){
    var plats = platsFor(gCreator);
    var done = gClips.filter(function(c){ return clipUploaded(c, gCreator); });
    if(plats.length > 1){
      // Brigit: C4S must go up first, then LF, then fully uploaded
      var c4s = gClips.filter(function(c){ return (c.platforms||{})['C4S']===PEND; });
      var lf  = gClips.filter(function(c){
        return (c.platforms||{})['C4S']!==PEND
          && plats.some(function(pl){ return pl!=='C4S' && (c.platforms||{})[pl]===PEND; });
      });
      return dbSection('c4s', 'To upload to C4S',   c4s,  'None waiting for C4S.')
           + dbSection('lf',  'To upload to LF',    lf,   'None waiting for LF.')
           + dbSection('up',  'Uploaded everywhere', done, 'Nothing uploaded yet.');
    }
    var toUpload = gClips.filter(function(c){ return !clipUploaded(c, gCreator); });
    return dbSection('todo', 'To upload', toUpload, 'All caught up!')
         + dbSection('up', 'Uploaded', done, 'Nothing uploaded yet.');
  }

  // ---- tab: INVOICING ------------------------------------------------------
  function renderInvoices(){
    var cons = gConsulting || {};
    var hpi  = cons.hoursPerInvoice || 10;
    var secs = cons.currentPeriodSeconds || 0;
    var threshold = Math.max(1, Math.round(hpi*3600));
    var pct = Math.min(100, Math.round(secs/threshold*100));

    // progress toward the next invoice
    var h = '<div class="sec-lbl" style="margin-top:6px">Time logged this period</div>';
    h += '<div class="card">'
       + '<div class="prog-head"><span class="prog-since">'
       + (cons.currentPeriodStart ? 'Since '+esc(fmtDate(cons.currentPeriodStart)) : 'Current period')
       + '</span><span class="prog-pct">'+pct+'%</span></div>'
       + '<div class="prog-bar"><div class="prog-fill'+(pct>=100?' done':'')+'" style="width:'+pct+'%"></div></div>'
       + '<div class="prog-sub">'+fmtHours(secs)+' of '+hpi+'h logged</div></div>';

    // invoices, newest first, under the bar
    var invoices = (cons.invoices || []).slice();
    h += '<div class="sec-lbl">Invoices</div>';
    if(!invoices.length){ h += '<div class="card"><div class="empty">No invoices yet.</div></div>'; return h; }
    invoices.sort(function(a,b){ return (b.invoiceNum||b.id||0) - (a.invoiceNum||a.id||0); });
    invoices.forEach(function(inv){
      var sym = inv.currency || (gConsulting && gConsulting.currency) || '$';
      var rate = inv.rate || (gConsulting && gConsulting.rate) || 0;
      var amt = Math.round(rate * (inv.hours||0));
      var status, label;
      if(inv.paidAt){ status='paid'; label='✓ Paid '+fmtDate(inv.paidAt); }
      else if(inv.invoicedAt){ status='sent'; label='Sent '+fmtDate(inv.invoicedAt); }
      else { status='unsent'; label='Not sent yet'; }
      var num = String(inv.invoiceNum || inv.id || '').replace(/^#*/, '');
      h += '<div class="card inv">'
         + '<div><div class="amt">'+esc(sym)+amt+' <span style="color:var(--faint);font-weight:700">· '+(inv.hours||0)+'h</span></div>'
         + '<div class="per">'+(num?'#'+esc(num)+' · ':'')+esc(fmtRange(inv.periodStart, inv.periodEnd))+'</div></div>'
         + '<span class="badge '+status+'">'+esc(label)+'</span></div>';
    });
    return h;
  }

  // ---- shell ---------------------------------------------------------------
  function tabBtn(id, icon, label){
    return '<button class="tab'+(tab===id?' active':'')+'" onclick="window.__tab(\''+id+'\')">'
      + '<span class="ti">'+icon+'</span><span class="tl">'+label+'</span></button>';
  }
  function renderApp(){
    var cr = CREATORS[gCreator] || {name:gCreator, initials:gCreator, grad:'linear-gradient(135deg,#5a6a8a,#7a5a8a)', accent:'#7a5a8a'};
    document.documentElement.style.setProperty('--accent', cr.accent);
    var body = tab==='cal' ? renderCalendar() : tab==='db' ? renderDatabase() : renderInvoices();
    var h = '<div class="appbar" style="background:'+cr.grad+'">'
      + '<div class="av">'+esc(cr.initials)+'</div>'
      + '<div><div class="nm">'+esc(cr.name)+'</div><div class="sub">Content Dashboard</div></div>'
      + '<button class="signout" onclick="window.__signout()">Sign out</button></div>'
      + '<div class="scroll">'+body+'</div>'
      + '<div class="tabbar">'
      +   tabBtn('cal','📅','Calendar')
      +   tabBtn('db','🗂️','Database')
      +   tabBtn('inv','🧾','Invoicing')
      + '</div>';
    document.getElementById('app').innerHTML = h;
  }

  window.__tab = function(t){ tab=t; selDay=null; renderApp(); };
  window.__mon = function(delta){
    calM += delta; selDay=null;
    if(calM<0){ calM=11; calY--; } else if(calM>11){ calM=0; calY++; }
    renderApp();
  };
  window.__day = function(d){
    selDay = (selDay===d ? null : d); // tap again to close
    renderApp();
    if(selDay) requestAnimationFrame(function(){
      var el = document.getElementById('dayDetail');
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    });
  };
  window.__db = function(k){ dbOpen[k] = !dbOpen[k]; renderApp(); };
  window.__clip = function(id){ clipOpen = (clipOpen===id ? null : id); renderApp(); };
  window.__signout = function(){ auth.signOut(); };

  function fail(msg){
    document.getElementById('app').innerHTML =
      '<div class="loading">'+esc(msg)+'<br><br>'
      + '<button class="signout" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer" onclick="window.__signout()">Sign out</button></div>';
  }

  // ---- data load -----------------------------------------------------------
  function parse(snap){
    if(!snap || !snap.exists) return null;
    var data = snap.data();
    if(!data || typeof data.value !== 'string') return null;
    try { return JSON.parse(data.value); } catch(e){ return null; }
  }
  function loadAndWatch(owner, creatorCode){
    gCreator = creatorCode;
    var clipsRef = db.collection('users').doc(owner).collection('kv').doc('lg-v8-'+creatorCode);
    var consRef  = db.collection('users').doc(owner).collection('kv').doc('lg-consulting-'+creatorCode);
    var gotClips = false;
    clipsRef.onSnapshot(function(snap){
      var p = parse(snap);
      gClips = (p && p.clips) ? p.clips : [];
      gotClips = true; renderApp();
    }, function(err){ fail('Could not load your clips. ('+err.code+')'); });
    consRef.onSnapshot(function(snap){
      gConsulting = parse(snap);
      if(gotClips) renderApp();
    }, function(){ /* no invoices is fine */ });
  }

  // ---- login ---------------------------------------------------------------
  function showLogin(message){
    document.getElementById('app').innerHTML =
      '<div id="login"><div class="box">'
      + '<h1>Sign in</h1><p>Enter the email &amp; password you were given.</p>'
      + '<label>Email</label><input id="ce" type="email" autocomplete="username">'
      + '<label>Password</label><input id="cp" type="password" autocomplete="current-password">'
      + '<button id="cb">Sign in</button>'
      + '<div class="msg" id="cm">'+(message||'')+'</div></div></div>';
    function submit(){
      var e = document.getElementById('ce').value.trim();
      var p = document.getElementById('cp').value;
      document.getElementById('cm').textContent = 'Signing in…';
      auth.signInWithEmailAndPassword(e, p).catch(function(err){
        document.getElementById('cm').textContent = err.message;
      });
    }
    document.getElementById('cb').onclick = submit;
    document.getElementById('cp').addEventListener('keydown', function(ev){ if(ev.key==='Enter') submit(); });
  }

  // ---- boot ----------------------------------------------------------------
  auth.onAuthStateChanged(function(user){
    if(!user){ showLogin(); return; }
    document.getElementById('app').innerHTML = '<div class="loading">Loading your dashboard…</div>';
    db.collection('clientAccess').doc(user.uid).get().then(function(snap){
      if(!snap.exists){ fail("This account isn't set up for access yet. Please contact Rachel."); return; }
      var a = snap.data();
      if(!a.owner || !a.creator){ fail('Your access is misconfigured. Please contact Rachel.'); return; }
      loadAndWatch(a.owner, a.creator);
    }).catch(function(err){ fail('Could not check your access. ('+err.code+')'); });
  });
})();
</script>
</body>
</html>
